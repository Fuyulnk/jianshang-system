<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f6df5'/><text y='.88em' font-size='72' x='50' text-anchor='middle' fill='white' font-family='PingFang SC, sans-serif'>简</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简尚系统</title>
    <script>
      (function(){
        var resetKeys = [
          'theme',
          'theme-mode',
          'personal-appearance',
          'ai-pet-size',
          'ai-pet-pos',
          'account-summary-mode',
          'account-summary-month',
          'token',
          'user',
          'remembered-auth-v1'
        ];
        function safeGet(key) {
          try { return window.localStorage ? window.localStorage.getItem(key) : null; } catch (e) { return null; }
        }
        function safeRemove(key) {
          try { if (window.localStorage) window.localStorage.removeItem(key); } catch (e) {}
          try { if (window.sessionStorage) window.sessionStorage.removeItem(key); } catch (e) {}
        }
        function resetLocalState() {
          for (var i = 0; i < resetKeys.length; i += 1) safeRemove(resetKeys[i]);
          safeRemove('jianshang-session');
        }
        try {
          var params = new URLSearchParams(window.location.search || '');
          if (params.get('resetLocal') === '1') {
            resetLocalState();
            window.history.replaceState(null, '', '/');
          }
        } catch (e) {}
        try {
          var mode = safeGet('theme-mode');
          var theme = safeGet('theme');
          if (mode !== null && mode !== 'auto' && mode !== 'manual') safeRemove('theme-mode');
          if (theme !== null && theme !== 'dark' && theme !== 'light') {
            safeRemove('theme');
            theme = null;
          }
          if (theme === 'dark' || (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          resetLocalState();
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
